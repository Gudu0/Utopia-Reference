<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Utopia: Origin Notes - Map</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      html, body {
      height: 100%;
      overflow: hidden;
      }
      .map-layout {
      display: flex;
      height: calc(100vh - 110px);
      overflow: hidden;
      position: relative;
      }
      /* ── Left sidebar: filters ── */
      .map-sidebar {
      width: 220px;
      min-width: 180px;
      background: var(--panel-bg, #1e1e2e);
      border-right: 1px solid var(--border, #333);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 12px;
      gap: 12px;
      flex-shrink: 0;
      z-index: 1000;
      }
      .map-sidebar h3 {
      margin: 0 0 6px 0;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted, #888);
      }
      .search-input, .island-select {
      width: 100%;
      box-sizing: border-box;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid var(--border, #444);
      background: var(--input-bg, #2a2a3e);
      color: var(--text, #eee);
      font-size: 0.88rem;
      }
      .search-input::placeholder { color: var(--muted, #666); }
      .filter-list { display: flex; flex-direction: column; gap: 6px; }
      .filter-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      }
      .filter-item input[type="checkbox"] {
      accent-color: var(--accent, #7c6af7);
      width: 15px; height: 15px;
      cursor: pointer;
      }
      .type-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
      }
      .result-count {
      font-size: 0.78rem;
      color: var(--muted, #888);
      margin-top: 4px;
      }
      /* ── Map ── */
      #map { flex: 1; background: #111; }
      /* ── Leaflet popup theme ── */
      .leaflet-popup-content-wrapper {
      background: var(--panel-bg, #1e1e2e);
      color: var(--text, #eee);
      border: 1px solid var(--border, #444);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      }
      .leaflet-popup-tip { background: var(--panel-bg, #1e1e2e); }
      .leaflet-popup-content { margin: 10px 14px; font-size: 0.88rem; line-height: 1.5; }
      .popup-name { font-weight: 600; font-size: 1rem; margin-bottom: 4px; }
      .popup-type { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
      .popup-island { color: var(--muted, #aaa); font-size: 0.82rem; }
      .popup-notes { margin-top: 6px; font-style: italic; color: var(--muted, #aaa); font-size: 0.82rem; }
      /* ── Node editor popout (right side) ── */
      /* REPLACE WITH: */
      .editor-panel {
      width: 0;
      min-width: 0;
      background: var(--panel-bg, #1e1e2e);
      border-left: 0px solid var(--border, #333);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: width 0.25s ease, border-width 0.25s ease;
      position: relative;
      }
      .editor-panel.open {
      width: 300px;
      border-left-width: 1px;
      }
      /* Tab that sticks out to the left of the panel */
      .editor-tab {
      position: absolute;
      top: 50%;
      left: -33px;
      transform: translateY(-50%);
      width: 32px;
      background: var(--panel-bg, #1e1e2e);
      border: 1px solid var(--border, #333);
      border-right: none;
      border-radius: 6px 0 0 6px;
      cursor: pointer;
      padding: 10px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      z-index: 1600;
      color: var(--muted, #aaa);
      font-size: 0.65rem;
      text-align: center;
      line-height: 1.3;
      letter-spacing: 0.03em;
      user-select: none;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      }
      .editor-tab:hover { color: var(--text, #eee); }
      .editor-tab-icon {
      font-size: 1rem;
      writing-mode: horizontal-tb;
      margin-bottom: 4px;
      }
      /* Panel header */
      .editor-panel-header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border, #333);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      }
      .editor-panel-header h3 {
      margin: 0;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted, #888);
      }
      /* Scrollable form area */
      .editor-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      }
      .editor-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      }
      .editor-field label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted, #888);
      }
      .editor-field input,
      .editor-field select,
      .editor-field textarea {
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid var(--border, #444);
      background: var(--input-bg, #2a2a3e);
      color: var(--text, #eee);
      font-size: 0.88rem;
      width: 100%;
      box-sizing: border-box;
      }
      .editor-field textarea {
      resize: vertical;
      min-height: 56px;
      font-family: inherit;
      }
      .coord-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      }
      .editor-btn {
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      }
      .editor-btn.primary {
      background: var(--accent, #7c6af7);
      color: white;
      width: 100%;
      }
      .editor-btn.primary:hover { opacity: 0.88; }
      .editor-btn.small {
      background: var(--input-bg, #2a2a3e);
      color: var(--muted, #aaa);
      border: 1px solid var(--border, #444);
      font-size: 0.78rem;
      padding: 5px 10px;
      }
      .editor-btn.small:hover { color: var(--text, #eee); }
      /* Status message */
      .editor-status {
      font-size: 0.8rem;
      color: #6abf69;
      min-height: 18px;
      text-align: center;
      }
      /* JSON output */
      .json-output {
      background: var(--input-bg, #2a2a3e);
      border: 1px solid var(--border, #444);
      border-radius: 6px;
      padding: 10px;
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--text, #ddd);
      white-space: pre;
      overflow-x: auto;
      max-height: 220px;
      overflow-y: auto;
      line-height: 1.5;
      }
      /* Node preview list */
      .node-preview-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 160px;
      overflow-y: auto;
      }
      .node-preview-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      padding: 4px 6px;
      border-radius: 4px;
      background: var(--input-bg, #2a2a3e);
      }
      .node-preview-item .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      }
      .node-preview-name { flex: 1; color: var(--text, #eee); }
      .node-preview-coords { color: var(--muted, #777); font-family: monospace; font-size: 0.72rem; }
      .node-preview-remove {
      background: none;
      border: none;
      color: var(--muted, #666);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0 2px;
      line-height: 1;
      }
      .node-preview-remove:hover { color: #e57373; }
      /* Section divider */
      .section-divider {
      border: none;
      border-top: 1px solid var(--border, #333);
      margin: 4px 0;
      }
      /* Mobile */
      .sidebar-toggle {
      display: none;
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 2000;
      background: var(--accent, #7c6af7);
      color: white;
      border: none;
      border-radius: 50%;
      width: 48px; height: 48px;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      }
      @media (max-width: 640px) {
      .map-sidebar {
      position: fixed;
      top: 70px; left: 0; bottom: 0;
      z-index: 1500;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      width: 85vw; max-width: 300px;
      }
      .map-sidebar.open { transform: translateX(0); }
      .sidebar-toggle { display: flex; align-items: center; justify-content: center; }
      .editor-panel { width: 90vw; }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="header-row">
        <div>
          <h1>Utopia: Origin Notes</h1>
          <p class="subtitle">Resource Map</p>
        </div>
        <nav class="top-nav">
          <a href="index.html" class="nav-link">Reference</a>
          <a href="map.html" class="nav-link current">Map</a>
          <a href="editor.html" class="nav-link">JSON Maker</a>
          <button class="nav-link" id="node-editor-btn">+ Node</button>
        </nav>
      </div>
    </header>
    <div class="map-layout">
      <!-- ── Left sidebar: filters ── -->
      <aside class="map-sidebar" id="sidebar">
        <div>
          <h3>Search</h3>
          <input class="search-input" id="search-input" type="text"
            placeholder="e.g. Iron Ore, Wolf…" autocomplete="off" />
          <div class="result-count" id="result-count"></div>
        </div>
        <div>
          <h3>Island</h3>
          <select class="island-select" id="island-select">
            <option value="all">All Islands</option>
          </select>
        </div>
        <div>
          <h3>Resource Type</h3>
          <div class="filter-list" id="filter-list"></div>
        </div>
      </aside>
      <!-- ── Map ── -->
      <div id="map"></div>
      
      <!-- ── Node editor modal ── -->
    <div id="editor-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:3000;align-items:center;justify-content:center;">
      <div style="background:#18212b;border:1px solid #2d3c4c;border-radius:12px;width:340px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;">
        <div style="padding:12px 16px;border-bottom:1px solid #2d3c4c;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:0.85rem;text-transform:uppercase;letter-spacing:0.05em;color:#9fb0c2">Add Node</span>
          <button id="close-modal-btn" style="background:none;border:none;color:#9fb0c2;font-size:1.2rem;cursor:pointer">✕</button>
        </div>
        <div style="overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px">
          <button class="btn" id="load-existing-btn">Load existing map-nodes.json</button>
          <div id="load-existing-area" style="display:none;flex-direction:column;gap:6px">
            <textarea id="existing-json-input" rows="3" style="width:100%;box-sizing:border-box;background:#202c38;color:#e8eef5;border:1px solid #2d3c4c;border-radius:6px;padding:8px;font:inherit;resize:vertical" placeholder='[{"id":1,...}]'></textarea>
            <button class="btn" id="confirm-load-btn">Load</button>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px">
            <label style="font-size:0.78rem;text-transform:uppercase;color:#9fb0c2">Resource Name</label>
            <select id="node-name" style="background:#202c38;color:#e8eef5;border:1px solid #2d3c4c;border-radius:6px;padding:7px 10px;font:inherit;width:100%;box-sizing:border-box"></select>
            <input id="node-name-manual" type="text" placeholder="Type resource name..." autocomplete="off" style="display:none;background:#202c38;color:#e8eef5;border:1px solid #2d3c4c;border-radius:6px;padding:7px 10px;font:inherit;width:100%;box-sizing:border-box;margin-top:6px" /></div>
          <div style="display:flex;flex-direction:column;gap:4px">
            <label style="font-size:0.78rem;text-transform:uppercase;color:#9fb0c2">Type</label>
            <select id="node-type" style="background:#202c38;color:#e8eef5;border:1px solid #2d3c4c;border-radius:6px;padding:7px 10px;font:inherit;width:100%;box-sizing:border-box">
              <option value="mineral">Mineral</option>
              <option value="food">Food</option>
              <option value="wood">Wood</option>
              <option value="plant">Plant</option>
              <option value="creature">Creature</option>
              <option value="chest">Chest</option>
              <option value="fishing">Fishing</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px">
            <label style="font-size:0.78rem;text-transform:uppercase;color:#9fb0c2">Island</label>
            <select id="node-island" style="background:#202c38;color:#e8eef5;border:1px solid #2d3c4c;border-radius:6px;padding:7px 10px;font:inherit;width:100%;box-sizing:border-box">
              <option value="">— select island —</option>
              <option>Bone Mountains</option><option>Cape Forest</option>
              <option>Dragon Tree Island</option><option>Elaine Grand Desert</option>
              <option>Fragrant Plains</option><option>Goldvalley Prairie</option>
              <option>Herder Plains</option><option>Iridescent Forest</option>
              <option>Iridescent Valley</option><option>Jade Prairie</option>
              <option>Joy River Valley</option><option>Lalu Volcano</option>
              <option>Leaf Fall Mountains</option><option>Mirage Desert</option>
              <option>Natanz Island</option><option>Noons Sky Islands</option>
              <option>Northrend</option><option>Old Bread Island</option>
              <option>Old Mornmist Forest</option><option>Old Platinum Bay</option>
              <option>Old Travelers Hill</option><option>Old Tulip Plains</option>
              <option>Shadesnow Mountain</option><option>Silvermoon Hills</option>
              <option>Sleeping Sea</option><option>Solitude Mountain</option>
              <option>Springday Coast</option><option>Sunset Island</option>
              <option>Mount Beia</option><option>The City of Hope - Ceylens</option>
              <option>Twilight Foothills</option><option>Valhalla</option>
              <option>Wilds of Duguang</option>
            </select>
          </div>
          <div style="display:flex;gap:8px">
            <div style="flex:1;display:flex;flex-direction:column;gap:4px">
              <label style="font-size:0.78rem;text-transform:uppercase;color:#9fb0c2">X</label>
              <input id="node-x" type="number" placeholder="X" style="background:#202c38;color:#e8eef5;border:1px solid #2d3c4c;border-radius:6px;padding:7px 10px;font:inherit;width:100%;box-sizing:border-box" />
            </div>
            <div style="flex:1;display:flex;flex-direction:column;gap:4px">
              <label style="font-size:0.78rem;text-transform:uppercase;color:#9fb0c2">Y</label>
              <input id="node-y" type="number" placeholder="Y" style="background:#202c38;color:#e8eef5;border:1px solid #2d3c4c;border-radius:6px;padding:7px 10px;font:inherit;width:100%;box-sizing:border-box" />
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px">
            <label style="font-size:0.78rem;text-transform:uppercase;color:#9fb0c2">Notes (optional)</label>
            <textarea id="node-notes" rows="2" style="background:#202c38;color:#e8eef5;border:1px solid #2d3c4c;border-radius:6px;padding:7px 10px;font:inherit;width:100%;box-sizing:border-box;resize:vertical" placeholder="Respawns quickly, guarded, etc."></textarea>
          </div>
          <button id="add-node-btn" class="btn" style="border-color:#6fcf97;width:100%;font-weight:600">Add Node</button>
          <div id="editor-status" style="font-size:0.8rem;min-height:18px;text-align:center;color:#6fcf97"></div>
          <hr style="border:none;border-top:1px solid #2d3c4c;margin:4px 0" />
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:0.78rem;text-transform:uppercase;color:#9fb0c2">This session (<span id="node-count">0</span>)</span>
            <button class="btn" id="copy-json-btn" style="font-size:0.78rem;padding:4px 10px">Copy JSON</button>
          </div>
          <div id="node-preview-list" style="display:flex;flex-direction:column;gap:4px;max-height:120px;overflow-y:auto"></div>
          <hr style="border:none;border-top:1px solid #2d3c4c;margin:4px 0" />
          <pre id="json-output" style="background:#202c38;border:1px solid #2d3c4c;border-radius:6px;padding:10px;font-size:0.72rem;color:#e8eef5;white-space:pre;overflow:auto;max-height:160px;margin:0">[ ]</pre>
          <div style="font-size:0.72rem;color:#9fb0c2">Copy JSON then replace <code>map-nodes.json</code> in your repo.</div>
        </div>
      </div>
    </div>
    </div>
    <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle filters">⚙</button>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="map.js"></script>
    <script>
  // ============================================================
  //  RESOURCE LIST — edit this to add/remove resource names
  //  Add new types by adding a new key with an array of names.
  //  Names appear in the dropdown when that type is selected.
  // ============================================================
  const RESOURCE_LIST = {
    mineral: [
      'Iron Mine', 'Stone Mine', 'Silver Mine', 'Gold Mine',
      'Crystal Mine', 'Obsidian Mine', 'Fire Magic Mine',
      'Coal Mine', 'Steam Stone Mine',
    ],
    food: [
      'Blueberry Bush', 'Strawberry Bush', 'Blackberry Bush',
      'Grapes', 'Soybean', 'Chilli', 'Watermelon',
      'Coconut', 'Wheat', 'Pepper', 'Mushroom',
      'Green Carp', 'Red Carp', 'Geoduck', 'Hairy Crab',
    ],
    tree: [
      'Oak Tree', 'Pine Tree', 'Ancient Tree',
      'Rubber Tree', 'Crystal Branch Tree',
    ],
    plant: [
      'Plant Fiber', 'Seaweed', 'Straw', 'Dragon Grass',
      'Whirlwind Grass', 'Cotton', 'Silk', 'Wool', 'Resin',
    ],
    creature: [
      'Wolf', 'Duck', 'Deer', 'Spider',
      'Scorpion', 'Skeleton Soldier',
    ],
    chest: [
      'Hidden Chest', 'Ruins Chest',
    ],
    fishing: [
      'Fishing Spot',
    ],
    other: [
      'Wisp', 'Magnet', 'Orb',
    ],
  };

  // ============================================================
  //  TYPE COLORS — must have an entry for every key above
  // ============================================================
  const TYPE_COLORS = {
    mineral:  '#a0a0c0',
    food:     '#6abf69',
    tree:     '#8d6e3f',
    plant:    '#4caf50',
    creature: '#e57373',
    chest:    '#ffd54f',
    fishing:  '#4fc3f7',
    other:    '#b0b0b0',
  };

  let workingNodes = [], nextId = 1;

  const modal = document.getElementById('editor-modal');

  function openModal()  { modal.style.display = 'flex'; document.getElementById('node-name').focus(); }
  function closeModal() { modal.style.display = 'none'; }

  document.getElementById('node-editor-btn').addEventListener('click', openModal);
  document.getElementById('close-modal-btn').addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'n' && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) openModal();
    if (e.key === 'Escape') closeModal();
  });

  // ── Populate type dropdown from RESOURCE_LIST keys ──────────
  const typeSelect = document.getElementById('node-type');
  typeSelect.innerHTML = '';
  Object.keys(RESOURCE_LIST).forEach(type => {
    const opt = document.createElement('option');
    opt.value = type;
    opt.textContent = type.charAt(0).toUpperCase() + type.slice(1);
    typeSelect.appendChild(opt);
  });

  // ── Name dropdown: rebuilds when type changes ────────────────
  function rebuildNameDropdown() {
    const type  = typeSelect.value;
    const names = RESOURCE_LIST[type] || [];
    const sel   = document.getElementById('node-name');
    sel.innerHTML = '';

    names.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
    });

    // Always offer a manual entry option at the bottom
    const other = document.createElement('option');
    other.value = '__other__';
    other.textContent = '— type manually —';
    sel.appendChild(other);

    sel.dispatchEvent(new Event('change'));
  }

  typeSelect.addEventListener('change', rebuildNameDropdown);

  // ── Show/hide manual text input ──────────────────────────────
  document.getElementById('node-name').addEventListener('change', function() {
    const manualInput = document.getElementById('node-name-manual');
    if (this.value === '__other__') {
      manualInput.style.display = 'block';
      manualInput.focus();
    } else {
      manualInput.style.display = 'none';
    }
  });

  // ── Load existing ────────────────────────────────────────────
  document.getElementById('load-existing-btn').addEventListener('click', () => {
    const a = document.getElementById('load-existing-area');
    a.style.display = a.style.display === 'none' ? 'flex' : 'none';
  });

  document.getElementById('confirm-load-btn').addEventListener('click', () => {
    try {
      const parsed = JSON.parse(document.getElementById('existing-json-input').value.trim());
      if (!Array.isArray(parsed)) throw new Error();
      workingNodes = parsed;
      nextId = parsed.reduce((m,n) => Math.max(m, n.id||0), 0) + 1;
      document.getElementById('load-existing-area').style.display = 'none';
      document.getElementById('existing-json-input').value = '';
      showStatus(`Loaded ${parsed.length} nodes.`);
      refreshOutput();
    } catch { showStatus('Invalid JSON.', true); }
  });

  // ── Add node ─────────────────────────────────────────────────
  document.getElementById('add-node-btn').addEventListener('click', () => {
    const nameSelect = document.getElementById('node-name');
    const name = nameSelect.value === '__other__'
      ? document.getElementById('node-name-manual').value.trim()
      : nameSelect.value;
    const type   = typeSelect.value;
    const island = document.getElementById('node-island').value;
    const x      = parseInt(document.getElementById('node-x').value, 10);
    const y      = parseInt(document.getElementById('node-y').value, 10);
    const notes  = document.getElementById('node-notes').value.trim();

    if (!name)               return showStatus('Name required.', true);
    if (!island)             return showStatus('Select an island.', true);
    if (isNaN(x)||isNaN(y)) return showStatus('X and Y required.', true);

    workingNodes.push({ id: nextId++, name, type, island, notes, x, y });
    document.getElementById('node-x').value     = '';
    document.getElementById('node-y').value     = '';
    document.getElementById('node-notes').value = '';
    document.getElementById('node-x').focus();
    showStatus(`Added: ${name} (${x}, ${y})`);
    refreshOutput();
  });

  ['node-x','node-y'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('add-node-btn').click();
    });
  });

  // ── Refresh output + preview ─────────────────────────────────
  function refreshOutput() {
    document.getElementById('json-output').textContent = JSON.stringify(workingNodes, null, 2);
    document.getElementById('node-count').textContent  = workingNodes.length;
    const list = document.getElementById('node-preview-list');
    if (workingNodes.length === 0) {
      list.innerHTML = '<div style="font-size:0.78rem;color:#9fb0c2">No nodes yet.</div>';
      return;
    }
    list.innerHTML = '';
    [...workingNodes].reverse().slice(0,20).forEach(node => {
      const color = TYPE_COLORS[node.type] || '#b0b0b0';
      const d = document.createElement('div');
      d.style.cssText = 'display:flex;align-items:center;gap:8px;font-size:0.8rem;padding:4px 6px;border-radius:4px;background:#202c38';
      d.innerHTML = `
        <span style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block"></span>
        <span style="flex:1;color:#e8eef5">${node.name}</span>
        <span style="color:#9fb0c2;font-family:monospace;font-size:0.72rem">(${node.x},${node.y})</span>
        <button data-id="${node.id}" style="background:none;border:none;color:#666;cursor:pointer;font-size:0.9rem;padding:0 2px">✕</button>
      `;
      d.querySelector('button').addEventListener('click', () => {
        workingNodes = workingNodes.filter(n => n.id !== node.id);
        refreshOutput();
      });
      list.appendChild(d);
    });
  }

  // ── Copy JSON ─────────────────────────────────────────────────
  document.getElementById('copy-json-btn').addEventListener('click', () => {
    navigator.clipboard.writeText(document.getElementById('json-output').textContent)
      .then(() => showStatus('Copied!'))
      .catch(() => {
        window.getSelection().selectAllChildren(document.getElementById('json-output'));
        showStatus('Press ⌘C to copy.');
      });
  });

  // ── Status ───────────────────────────────────────────────────
  let t;
  function showStatus(msg, err=false) {
    const el = document.getElementById('editor-status');
    el.textContent = msg;
    el.style.color = err ? '#e57373' : '#6fcf97';
    clearTimeout(t);
    t = setTimeout(() => el.textContent = '', 3000);
  }

  // ── Init ─────────────────────────────────────────────────────
  rebuildNameDropdown();
  refreshOutput();
</script>
  </body>
</html>
