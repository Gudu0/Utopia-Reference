<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item JSON Generator</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 24px;
            font-family: Arial, sans-serif;
            background: #1e1e1e;
            color: #e8e8e8;
            line-height: 1.4;
        }

        h1, h2 {
            margin-top: 0;
        }

        h1 {
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 28px;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        p {
            margin: 10px 0 6px;
        }

        input,
        select,
        textarea,
        button {
            font: inherit;
        }

        input,
        select,
        textarea {
            width: 100%;
            max-width: 900px;
            padding: 10px 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #2a2a2a;
            color: #f0f0f0;
        }

        input[readonly],
        textarea[readonly] {
            background: #252525;
            color: #cfcfcf;
        }

        
        .readonly {
            background: rgb(67, 67, 67) !important;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            padding: 10px 14px;
            margin-right: 8px;
            margin-top: 8px;
            border: 1px solid #555;
            border-radius: 8px;
            background: #333;
            color: #f5f5f5;
            cursor: pointer;
        }

        button:hover {
            background: #3f3f3f;
        }

        button:active {
            background: #4a4a4a;
        }

        .section-box {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 12px;
            max-width: 900px;
        }

        .entry-row {
            padding: 14px;
            border: 1px solid #444;
            border-radius: 12px;
            background: #252525;
        }

        .entry-row p:first-child {
            margin-top: 0;
            font-weight: bold;
            color: #ffffff;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Item JSON Generator</h1>

    <p>Name</p>
    <input id="nameInput" type="text">

    <p>ID (auto from name)</p>
    <input id="idInput" type="text" readonly class="readonly">

    <p>Description</p>
    <input id="descInput" type="text">

    <p>Image</p>
    <input id="imgInput" type="text" readonly class="readonly">

    <p>Notes</p>
    <input id="notesInput" type="text">

    <p>Weight</p>
    <input id="weightInput" type="number" step="0.01" value="0.01">

    <p>Category</p>
    <select id="categoryInput">
        <option value="Material">Material</option>
        <option value="Food">Food</option>
        <option value="Equippable">Equippable</option>
        <option value="Useable">Useable</option>
        <option value="Bulding">Bulding</option>
    </select>

    <p>Subcategory</p>
    <select id="subcategoryInput">
        <option value="Ore">Ore</option>
        <option value="Bar">Bar</option>
        <option value="Drop">Drop</option>
        <option value="Wood">Wood</option>
        <option value="BBQ">BBQ</option>
        <option value="DetermineSubcategory">DetermineSubcategory</option>
        <option value="Additives">Additives</option>
        <option value="EnchantStone">EnchantStone</option>
        <option value="Plant">Plant</option>
    </select>

    <p>Rarity</p>
    <select id="rarityInput">
        <option value="common">common</option>
        <option value="uncommon">uncommon</option>
        <option value="rare">rare</option>
        <option value="epic">epic</option>
        <option value="legendary">legendary</option>
    </select>

    <p>Bound</p>
    <select id="boundInput">
        <option value="false">false</option>
        <option value="true">true</option>
    </select>

    <div id="foodSection" class="hidden">
        <h2>Food Stats</h2>

        <p>Food</p>
        <input id="foodInput" type="number" value="0">

        <p>Water</p>
        <input id="waterInput" type="number" value="0">
    </div>

    <div id="equippableSection" class="hidden">
        <h2>Equippable Stats</h2>

        <p>Durability</p>
        <input id="durabilityInput" type="number" value="0">

        <p>Level Limit</p>
        <input id="levelLimitInput" type="number" value="0">
    </div>

    <p>Time-limited</p>
    <input id="timeLimitedInput" type="text" placeholder="leave blank if unused">

    <div style="display: none !important;">
        <h2>Node Sources</h2>
        <div id="nodeSourcesContainer" class="section-box"></div>
        <button id="addNodeSourceButton" type="button">Add Node Source</button>

    
        <h2>Enemy Sources</h2>
        <div id="enemySourcesContainer" class="section-box"></div>
        <button id="addEnemySourceButton" type="button">Add Enemy Source</button>
    

        <h2>Uses</h2>
        <div id="usesContainer" class="section-box"></div>
        <button id="addUseButton" type="button">Add Use</button>
    </div>
    
    <br><br>
    <button id="generateButton">Generate JSON</button>
    <button id="clearButton">Clear</button>
    <button id="copyButton">Copy text</button>

    <h2>Output</h2>
    <textarea id="output" rows="30" readonly></textarea>

    <script>
        const DEFAULT_NODE_SOURCE_1 = "";
        const DEFAULT_NODE_SOURCE_2 = "";

        const nameInput = document.getElementById("nameInput");
        const idInput = document.getElementById("idInput");
        const descInput = document.getElementById("descInput");
        const imgInput = document.getElementById("imgInput");
        const notesInput = document.getElementById("notesInput");
        const weightInput = document.getElementById("weightInput");
        const categoryInput = document.getElementById("categoryInput");
        const subcategoryInput = document.getElementById("subcategoryInput");
        const rarityInput = document.getElementById("rarityInput");
        const boundInput = document.getElementById("boundInput");
        const foodSection = document.getElementById("foodSection");
        const equippableSection = document.getElementById("equippableSection");
        const foodInput = document.getElementById("foodInput");
        const waterInput = document.getElementById("waterInput");
        const durabilityInput = document.getElementById("durabilityInput");
        const levelLimitInput = document.getElementById("levelLimitInput");
        const timeLimitedInput = document.getElementById("timeLimitedInput");

        const nodeSourcesContainer = document.getElementById("nodeSourcesContainer");
        const enemySourcesContainer = document.getElementById("enemySourcesContainer");
        const usesContainer = document.getElementById("usesContainer");

        const addNodeSourceButton = document.getElementById("addNodeSourceButton");
        const addEnemySourceButton = document.getElementById("addEnemySourceButton");
        const addUseButton = document.getElementById("addUseButton");

        const generateButton = document.getElementById("generateButton");
        const clearButton = document.getElementById("clearButton");
        const copyButton = document.getElementById("copyButton");
        const output = document.getElementById("output");

        function makeIdFromName(name) {
            return name
                .trim()
                .toLowerCase()
                .replace(/['"]/g, "")
                .replace(/[^a-z0-9]+/g, "_")
                .replace(/^_+|_+$/g, "");
        }

        function cleanTypedId(value) {
            if (!value) return "";
            return value
                .trim()
                .toLowerCase()
                .replace(/^"+|"+$/g, "")
                .replace(/['"]/g, "")
                .replace(/[^a-z0-9_]+/g, "_")
                .replace(/^_+|_+$/g, "");
        }

        function cleanTextValue(value) {
            return value.trim();
        }

        function updateAutoFields() {
            const id = makeIdFromName(nameInput.value);
            idInput.value = id;
            imgInput.value = id ? `${id}.jpg` : "";
        }

        function updateConditionalSections() {
            const category = categoryInput.value;
            foodSection.classList.toggle("hidden", category !== "Food");
            equippableSection.classList.toggle("hidden", category !== "Equippable");
        }

        function createSimpleRow(labelText, className, container, cleanFn, defaultValue = "") {
            const wrapper = document.createElement("div");
            wrapper.className = "entry-row";

            const title = document.createElement("p");
            title.textContent = labelText;
            wrapper.appendChild(title);

            const input = document.createElement("input");
            input.type = "text";
            input.className = className;
            input.value = defaultValue;

            input.addEventListener("keydown", (event) => {
                if (event.key !== "Enter") {
                    return;
                }

                event.preventDefault();
                input.value = cleanFn(input.value);

                const allRows = Array.from(container.querySelectorAll(".entry-row"));
                const currentIndex = allRows.indexOf(wrapper);
                const nextRow = allRows[currentIndex + 1];

                if (nextRow) {
                    const nextInput = nextRow.querySelector("input");
                    nextInput.focus();
                    nextInput.select();
                    return;
                }

                if (container === nodeSourcesContainer) {
                    addNodeSource("");
                } else if (container === enemySourcesContainer) {
                    addEnemySource("");
                } else if (container === usesContainer) {
                    addUse("");
                }

                const newRows = container.querySelectorAll(".entry-row");
                const newLastInput = newRows[newRows.length - 1].querySelector("input");
                newLastInput.focus();
                newLastInput.select();
            });

            wrapper.appendChild(input);

            const removeButton = document.createElement("button");
            removeButton.type = "button";
            removeButton.textContent = `Remove ${labelText}`;
            removeButton.addEventListener("click", () => {
                wrapper.remove();
                renumberRows(container, labelText);
            });
            wrapper.appendChild(removeButton);

            return wrapper;
        }

        function renumberRows(container, labelBase) {
            const rows = container.querySelectorAll(".entry-row");
            rows.forEach((row, index) => {
                row.querySelector("p").textContent = `${labelBase} ${index + 1}`;
            });
        }

        function addNodeSource(defaultValue = "") {
            const rowNumber = nodeSourcesContainer.querySelectorAll(".entry-row").length + 1;
            const row = createSimpleRow(`Node Source ${rowNumber}`, "node-source-input", nodeSourcesContainer, cleanTypedId, defaultValue);
            nodeSourcesContainer.appendChild(row);
        }

        function addEnemySource(defaultValue = "") {
            const rowNumber = enemySourcesContainer.querySelectorAll(".entry-row").length + 1;
            const row = createSimpleRow(`Enemy Source ${rowNumber}`, "enemy-source-input", enemySourcesContainer, cleanTypedId, defaultValue);
            enemySourcesContainer.appendChild(row);
        }

        function addUse(defaultValue = "") {
            const rowNumber = usesContainer.querySelectorAll(".entry-row").length + 1;
            const row = createSimpleRow(`Use ${rowNumber}`, "use-input", usesContainer, cleanTextValue, defaultValue);
            usesContainer.appendChild(row);
        }

        function getInputValues(container, inputClass, cleanFn) {
            const values = [];
            const inputs = container.querySelectorAll(`.${inputClass}`);

            inputs.forEach((input) => {
                const cleaned = cleanFn(input.value);
                if (cleaned !== "") {
                    values.push(cleaned);
                }
            });

            return values;
        }

        function generateItemObject() {
            const id = idInput.value.trim();
            const category = categoryInput.value;

            const item = {
                id: id,
                name: nameInput.value.trim(),
                weight: Number(weightInput.value),
                desc: descInput.value.trim(),
                img: id ? `${id}.jpg` : "",
                sources: {
                    node: getInputValues(nodeSourcesContainer, "node-source-input", cleanTypedId),
                    enemy: getInputValues(enemySourcesContainer, "enemy-source-input", cleanTypedId)
                },
                uses: getInputValues(usesContainer, "use-input", cleanTextValue),
                notes: notesInput.value.trim(),
                category: category,
                subcategory: subcategoryInput.value,
                rarity: rarityInput.value
            };

            if (boundInput.value === "true") {
                item.bound = true;
            } else {
                item.bound = false;
            }

            if (category === "Food") {
                item.foodStats = {
                    food: Number(foodInput.value),
                    water: Number(waterInput.value)
                };
            }

            if (category === "Equippable") {
                item.durability = Number(durabilityInput.value);
                item.levelLimit = Number(levelLimitInput.value);
            }

            const timeLimited = timeLimitedInput.value.trim();
            if (timeLimited !== "") {
                item["time-limited"] = timeLimited;
            }

            return item;
        }

        function resetNodeSources() {
            nodeSourcesContainer.innerHTML = "";
            // addNodeSource(DEFAULT_NODE_SOURCE_1);
        }

        function resetEnemySources() {
            enemySourcesContainer.innerHTML = "";
            // addEnemySource("");
        }

        function resetUses() {
            usesContainer.innerHTML = "";
            // addUse("");
        }

        function clearEntryFields() {
            nameInput.value = "";
            descInput.value = "";
            notesInput.value = "";
            weightInput.value = "0";
            foodInput.value = "0";
            waterInput.value = "0";
            durabilityInput.value = "0";
            levelLimitInput.value = "0";
            timeLimitedInput.value = "";
            output.value = "";

            resetNodeSources();
            resetEnemySources();
            resetUses();

            updateAutoFields();
            updateConditionalSections();
            nameInput.focus();
        }

        function gen() {
            const item = generateItemObject();
            const itemText = JSON.stringify(item, null, 4) + ",";

            if (output.value.trim() === "") {
                output.value = itemText;
            } else {
                output.value += "\n" + itemText;
            }
        }

        nameInput.addEventListener("input", updateAutoFields);

        nameInput.addEventListener("keydown", (event) => {
            if (event.key !== "Enter") {
                return;
            }

            event.preventDefault();

            let firstNodeSourceInput = nodeSourcesContainer.querySelector(".entry-row input");

            if (!firstNodeSourceInput) {
                addNodeSource("");
                firstNodeSourceInput = nodeSourcesContainer.querySelector(".entry-row input");
            }

            if (firstNodeSourceInput) {
                firstNodeSourceInput.focus();
                firstNodeSourceInput.select();
            }
        });

        categoryInput.addEventListener("change", updateConditionalSections);

        addNodeSourceButton.addEventListener("click", () => addNodeSource(""));
        addEnemySourceButton.addEventListener("click", () => addEnemySource(""));
        addUseButton.addEventListener("click", () => addUse(""));

        generateButton.addEventListener("click", () => {
            gen();
        });

        clearButton.addEventListener("click", () => {
            clearEntryFields();
        });

        copyButton.addEventListener("click", () => {
            gen();
            navigator.clipboard.writeText(output.value).catch((err) => {
                console.error("Could not copy text: ", err);
            });
            clearEntryFields();
        });

        resetNodeSources();
        resetEnemySources();
        resetUses();
        updateAutoFields();
        updateConditionalSections();
    </script>
</body>
</html>
