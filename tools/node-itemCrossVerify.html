<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Node/Item JSONC & Image Checker</title>
    <style>
        body { font-family: sans-serif; padding: 16px; max-width: 1200px; margin: 0 auto; }
        h1, h2, h3 { margin-bottom: 6px; }
        textarea { width: 100%; box-sizing: border-box; font-family: monospace; font-size: 12px; background: #fdfdfd; }
        .github-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
        .github-row input { flex: 1; min-width: 200px; font-family: monospace; font-size: 12px; padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; }
        .github-row button { padding: 4px 10px; cursor: pointer; }
        
        .button-group { border: 1px solid #ccc; padding: 10px; border-radius: 6px; margin-bottom: 10px; background: #fafafa; }
        .button-group-title { font-weight: bold; margin-bottom: 8px; font-size: 14px; text-transform: uppercase; color: #333; }
        .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .controls button { padding: 6px 12px; cursor: pointer; font-weight: bold; border: 1px solid #888; border-radius: 4px; }
        
        .btn-check { background: #e2f0d9; }
        .btn-check:hover { background: #c5e0b4; }
        .btn-fix { background: #fff2cc; }
        .btn-fix:hover { background: #ffe699; }
        .btn-all { background: #ddebf7; border-color: #9bc2e6 !important; }
        
        .filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; padding-top: 10px;}
        .filter-bar label { font-weight: bold; }
        .filter-bar input[type=text] { flex: 1; min-width: 200px; padding: 4px 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; }
        .filter-btn { padding: 3px 10px; cursor: pointer; border: 1px solid #999; border-radius: 4px; background: #f0f0f0; font-size: 12px; }
        .filter-btn.active { background: #333; color: #fff; border-color: #333; }
        
        #output { max-height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 8px; background: #fff; }
        #output p { margin: 3px 0; font-family: monospace; font-size: 13px; border-bottom: 1px solid #eee; padding-bottom: 2px; }
        #output p.hidden { display: none; }
        
        .status-info { color: #555; font-style: italic; }
        #matchCount { font-size: 12px; color: #666; margin-left: 8px; }
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>
    <h1>Node / Item JSONC & Image Checker</h1>

    <h2>Load Data from GitHub</h2>
    <div class="github-row">
        <input id="nodeUrl" type="text" placeholder="nodeDef.jsonc URL" value="https://github.com/Gudu0/Utopia-Reference/tree/main/encyclopedia/data/nodeDef.jsonc"/>
        <button id="loadNodeBtn">Load node.jsonc</button>
        <span id="nodeLoadStatus"></span>
    </div>
    <div class="github-row">
        <input id="itemUrl" type="text" placeholder="itemDef.jsonc URL" value="https://github.com/Gudu0/Utopia-Reference/tree/main/encyclopedia/data/itemDef.jsonc"/>
        <button id="loadItemBtn">Load item.jsonc</button>
        <span id="itemLoadStatus"></span>
    </div>
    <div class="github-row">
        <input id="nodeImgUrl" type="text" placeholder="nodeImages folder URL" value="https://github.com/Gudu0/Utopia-Reference/tree/main/encyclopedia/data/nodeImages"/>
        <button id="loadNodeImgBtn">Load Node Img List</button>
        <span id="nodeImgLoadStatus"></span>
    </div>
    <div class="github-row">
        <input id="itemImgUrl" type="text" placeholder="itemImages folder URL" value="https://github.com/Gudu0/Utopia-Reference/tree/main/encyclopedia/data/itemImages"/>
        <button id="loadItemImgBtn">Load Item Img List</button>
        <span id="itemImgLoadStatus"></span>
    </div>

    <div class="grid-layout">
        <div>
            <h3>node.jsonc</h3>
            <textarea id="nodeInput" rows="8"></textarea>
            <h3>Node Images (GitHub Directory)</h3>
            <textarea id="nodeImgList" rows="3" placeholder="List of filenames..."></textarea>
        </div>
        <div>
            <h3>item.jsonc</h3>
            <textarea id="itemInput" rows="8"></textarea>
            <h3>Item Images (GitHub Directory)</h3>
            <textarea id="itemImgList" rows="3" placeholder="List of filenames..."></textarea>
        </div>
    </div>

    <div class="button-group" style="margin-top: 15px;">
        <div class="button-group-title">Run Checks</div>
        <div class="controls">
            <button class="btn-check" id="checkCrossBtn">Check Sources & Drops</button>
            <button class="btn-check" id="checkImgFormatBtn">Check Image Naming (.jpg)</button>
            <button class="btn-check" id="checkGithubImgBtn">Verify GitHub Physical Files</button>
            <button class="btn-all" id="checkAllBtn">RUN ALL CHECKS</button>
        </div>
    </div>

    <div class="button-group">
        <div class="button-group-title">Fix Data (Outputs below)</div>
        <div class="controls">
            <button class="btn-fix" id="fixSourcesBtn">Fix item sources.node</button>
            <button class="btn-fix" id="fixImgBtn">Fix Image Names (.jpg)</button>
            <button class="btn-all" id="fixAllBtn">FIX BOTH</button>
            <button id="copyMissingBtn" style="margin-left: auto;">Copy Missing IDs</button>
        </div>
    </div>

    <h2>Output Log</h2>
    <div class="filter-bar">
        <label>Filter:</label>
        <input type="text" id="filterText" placeholder="Search errors..." />
        <button class="filter-btn active" data-type="all">All</button>
        <button class="filter-btn" data-type="mismatch">Mismatches</button>
        <button class="filter-btn" data-type="missing">Missing IDs</button>
        <button class="filter-btn" data-type="img">Images</button>
        <button class="filter-btn" data-type="info">Status</button>
        <button id="clearOutputBtn" style="margin-left:auto; padding: 2px 8px; cursor:pointer;">Clear Log</button>
        <span id="matchCount"></span>
    </div>
    <div id="output"></div>

    <div class="grid-layout" style="margin-top: 20px;">
        <div>
            <h3>Fixed node.jsonc</h3>
            <textarea id="fixedNodeOutput" rows="10" readonly></textarea>
        </div>
        <div>
            <h3>Fixed item.jsonc</h3>
            <textarea id="fixedItemOutput" rows="10" readonly></textarea>
        </div>
    </div>

    <script>
        // --- Selectors ---
        const nodeInput = document.getElementById("nodeInput");
        const itemInput = document.getElementById("itemInput");
        const nodeImgList = document.getElementById("nodeImgList");
        const itemImgList = document.getElementById("itemImgList");
        const output = document.getElementById("output");
        const filterText = document.getElementById("filterText");
        
        let lastMissingIds = new Set();

        // --- GitHub Logic ---
        function parseGithubUrl(url) {
            const u = url.trim();
            const match = u.match(/github\.com\/([^/]+)\/([^/]+)\/(?:blob|tree|raw)\/([^/]+)\/(.+)$/);
            if (match) return { owner: match[1], repo: match[2], branch: match[3], filePath: match[4] };
            return null;
        }

        async function loadFromGithub(url, textarea, statusEl, isDir = false) {
            statusEl.textContent = "Loading...";
            const parsed = parseGithubUrl(url);
            if (!parsed) { statusEl.textContent = "✗ Invalid URL"; return; }

            const apiUrl = `https://api.github.com/repos/${parsed.owner}/${parsed.repo}/contents/${parsed.filePath}?ref=${parsed.branch}`;
            
            try {
                const res = await fetch(apiUrl);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                
                if (Array.isArray(data)) {
                    textarea.value = data.map(f => f.name).join("\n");
                    statusEl.textContent = `✓ Loaded ${data.length} files`;
                } else if (data.content) {
                    textarea.value = decodeURIComponent(escape(atob(data.content)));
                    statusEl.textContent = "✓ Loaded File";
                }
            } catch (err) {
                statusEl.textContent = "✗ Failed";
            }
        }

        document.getElementById("loadNodeBtn").addEventListener("click", () => loadFromGithub(document.getElementById("nodeUrl").value, nodeInput, document.getElementById("nodeLoadStatus")));
        document.getElementById("loadItemBtn").addEventListener("click", () => loadFromGithub(document.getElementById("itemUrl").value, itemInput, document.getElementById("itemLoadStatus")));
        document.getElementById("loadNodeImgBtn").addEventListener("click", () => loadFromGithub(document.getElementById("nodeImgUrl").value, nodeImgList, document.getElementById("nodeImgLoadStatus"), true));
        document.getElementById("loadItemImgBtn").addEventListener("click", () => loadFromGithub(document.getElementById("itemImgUrl").value, itemImgList, document.getElementById("itemImgLoadStatus"), true));

        // --- Helper Logic ---
        function stripComments(text) {
            return text.replace(/\/\/.*$/gm, '');
        }

        function getParsedData() {
            try {
                const nodes = JSON.parse(stripComments(nodeInput.value));
                const items = JSON.parse(stripComments(itemInput.value));
                return { nodes, items, valid: true };
            } catch (e) {
                addLine(`JSON Parse Error: ${e.message}`, "info");
                return { valid: false };
            }
        }

        function addLine(text, type) {
            const p = document.createElement("p");
            p.textContent = text;
            p.dataset.type = type || "info";
            if (type === "info") p.classList.add("status-info");
            if (text.includes("Missing") || text.includes("Mismatch") || text.includes("Error")) p.style.color = "#c00";
            output.appendChild(p);
            applyFilters();
        }

        document.getElementById("clearOutputBtn").addEventListener("click", () => {
            output.innerHTML = "";
            lastMissingIds.clear();
            applyFilters();
        });

        // --- Checkers ---
        function checkImgFormat(nodes, items) {
            addLine("Checking Image Names...", "info");
            const check = (entries, label) => {
                entries.forEach(e => {
                    const expected = `${e.id}.jpg`;
                    if (e.img && e.img !== expected) addLine(`Img Naming: ${label} "${e.id}" uses "${e.img}", expected "${expected}"`, "img");
                });
            };
            check(nodes, "Node");
            check(items, "Item");
        }

        function verifyPhysicalImages(nodes, items) {
            addLine("Verifying GitHub Files...", "info");
            const verify = (jsonEntries, listText, label) => {
                if (!listText.trim()) return;
                const physicalFiles = new Set(listText.split("\n").map(s => s.trim()).filter(Boolean));
                const declaredInJson = new Set();

                jsonEntries.forEach(entry => {
                    if (entry.img) {
                        declaredInJson.add(entry.img);
                        if (!physicalFiles.has(entry.img)) {
                            addLine(`Missing in GitHub: ${label} "${entry.id}" references "${entry.img}" but file is missing.`, "img");
                        }
                    }
                });

                physicalFiles.forEach(file => {
                    if (!declaredInJson.has(file)) {
                        addLine(`Ghost File: "${file}" exists in ${label} folder but is not used in JSON.`, "img");
                    }
                });
            };
            verify(nodes, nodeImgList.value, "Node");
            verify(items, itemImgList.value, "Item");
        }

        function checkCrossReferences(nodes, items) {
            addLine("Checking Cross-References (Drops vs Sources)...", "info");
            
            const validNodeIds = new Set(nodes.map(n => n.id).filter(Boolean));
            const validItemIds = new Set(items.map(i => i.id).filter(Boolean));

            const nodeToDroppedItems = new Map();
            nodes.forEach(n => {
                if (!n.id) return;
                const dropped = new Set();
                if (n.drops && n.drops.items) {
                    // Handle both Array and Object notation safely
                    const dropList = Array.isArray(n.drops.items) ? n.drops.items : Object.values(n.drops.items);
                    dropList.forEach(d => { if (d && d.id) dropped.add(d.id); });
                }
                nodeToDroppedItems.set(n.id, dropped);
            });

            const itemToSourceNodes = new Map();
            items.forEach(i => {
                if (!i.id) return;
                const sources = new Set();
                if (i.sources && Array.isArray(i.sources.node)) {
                    i.sources.node.forEach(s => { if (typeof s === 'string') sources.add(s); });
                }
                itemToSourceNodes.set(i.id, sources);
            });

            // 1. Check Nodes dropping items
            nodes.forEach(n => {
                if (!n.id) return;
                const dropped = nodeToDroppedItems.get(n.id);
                dropped.forEach(itemId => {
                    if (!validItemIds.has(itemId)) {
                        if (!lastMissingIds.has(itemId)) {
                            addLine(`Unique Missing: Item "${itemId}" (referenced by node "${n.id}") does not exist in item JSON.`, "missing");
                            lastMissingIds.add(itemId);
                        }
                    } else {
                        const itemSources = itemToSourceNodes.get(itemId) || new Set();
                        if (!itemSources.has(n.id)) {
                            addLine(`Mismatch: Node "${n.id}" drops item "${itemId}", but item "${itemId}" does not list "${n.id}" in sources.node`, "mismatch");
                        }
                    }
                });
            });

            // 2. Check Items listing nodes
            items.forEach(i => {
                if (!i.id) return;
                const sources = itemToSourceNodes.get(i.id);
                sources.forEach(nodeId => {
                    if (!validNodeIds.has(nodeId)) {
                        if (!lastMissingIds.has(nodeId)) {
                            addLine(`Unique Missing: Node "${nodeId}" (referenced by item "${i.id}") does not exist in node JSON.`, "missing");
                            lastMissingIds.add(nodeId);
                        }
                    } else {
                        const nodeDrops = nodeToDroppedItems.get(nodeId) || new Set();
                        if (!nodeDrops.has(i.id)) {
                            addLine(`Mismatch: Item "${i.id}" lists node "${nodeId}" in sources.node, but node "${nodeId}" does not drop item "${i.id}"`, "mismatch");
                        }
                    }
                });
            });
        }

        // --- Fixers ---
        function runFixes(doSources, doImg) {
            const data = getParsedData();
            if (!data.valid) return;
            let { nodes, items } = data;
            let changes = 0;

            if (doImg) {
                [...nodes, ...items].forEach(e => {
                    if (!e.id) return;
                    const target = `${e.id}.jpg`;
                    if (e.img !== target) { e.img = target; changes++; }
                });
            }

            if (doSources) {
                // Build a map of what every node drops
                const itemToDroppedBy = new Map();
                nodes.forEach(n => {
                    if (!n.id || !n.drops || !n.drops.items) return;
                    const dropList = Array.isArray(n.drops.items) ? n.drops.items : Object.values(n.drops.items);
                    dropList.forEach(d => {
                        if (d && d.id) {
                            if (!itemToDroppedBy.has(d.id)) itemToDroppedBy.set(d.id, new Set());
                            itemToDroppedBy.get(d.id).add(n.id);
                        }
                    });
                });

                // Update items
                items.forEach(i => {
                    if (!i.id) return;
                    if (!i.sources) i.sources = {};
                    
                    const expectedNodes = Array.from(itemToDroppedBy.get(i.id) || []).sort();
                    const currentNodes = Array.isArray(i.sources.node) ? i.sources.node.sort() : [];
                    
                    const isSame = expectedNodes.length === currentNodes.length && expectedNodes.every((val, index) => val === currentNodes[index]);
                    
                    if (!isSame) {
                        i.sources.node = expectedNodes;
                        changes++;
                    }
                });
            }

            document.getElementById("fixedNodeOutput").value = JSON.stringify(nodes, null, 4);
            document.getElementById("fixedItemOutput").value = JSON.stringify(items, null, 4);
            addLine(`Fix applied. ${changes} changes made. Check outputs below.`, "info");
        }

        // --- Filtering Logic ---
        function applyFilters() {
            const search = filterText.value.toLowerCase();
            const activeType = document.querySelector(".filter-btn.active").dataset.type;
            const lines = output.querySelectorAll("p");
            let visible = 0;

            lines.forEach(p => {
                const textMatch = p.textContent.toLowerCase().includes(search);
                const typeMatch = activeType === "all" || p.dataset.type === activeType;
                if (textMatch && typeMatch) { p.classList.remove("hidden"); visible++; }
                else { p.classList.add("hidden"); }
            });
            document.getElementById("matchCount").textContent = `Showing ${visible} of ${lines.length}`;
        }

        // --- Attach Events ---
        document.getElementById("checkCrossBtn").addEventListener("click", () => {
            const data = getParsedData();
            if (data.valid) checkCrossReferences(data.nodes, data.items);
        });
        document.getElementById("checkImgFormatBtn").addEventListener("click", () => {
            const data = getParsedData();
            if (data.valid) checkImgFormat(data.nodes, data.items);
        });
        document.getElementById("checkGithubImgBtn").addEventListener("click", () => {
            const data = getParsedData();
            if (data.valid) verifyPhysicalImages(data.nodes, data.items);
        });
        document.getElementById("checkAllBtn").addEventListener("click", () => {
            const data = getParsedData();
            if (data.valid) {
                checkCrossReferences(data.nodes, data.items);
                checkImgFormat(data.nodes, data.items);
                verifyPhysicalImages(data.nodes, data.items);
                addLine("--- All checks finished ---", "info");
            }
        });

        document.getElementById("fixSourcesBtn").addEventListener("click", () => runFixes(true, false));
        document.getElementById("fixImgBtn").addEventListener("click", () => runFixes(false, true));
        document.getElementById("fixAllBtn").addEventListener("click", () => runFixes(true, true));

        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                applyFilters();
            });
        });
        filterText.addEventListener("input", applyFilters);
        
        document.getElementById("copyMissingBtn").addEventListener("click", () => {
            if(lastMissingIds.size === 0) {
                alert("No missing IDs to copy.");
                return;
            }
            navigator.clipboard.writeText(Array.from(lastMissingIds).join(", "));
            alert("Copied missing IDs!");
        });
    </script>
</body>
</html>
