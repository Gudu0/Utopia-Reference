<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Node JSON Generator</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 24px;
            font-family: Arial, sans-serif;
            background: #1e1e1e;
            color: #e8e8e8;
            line-height: 1.4;
        }

        h1, h2 {
            margin-top: 0;
        }

        h1 {
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 28px;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        p {
            margin: 10px 0 6px;
        }

        input,
        select,
        textarea,
        button {
            font: inherit;
        }

        input,
        select,
        textarea {
            width: 100%;
            max-width: 900px;
            padding: 10px 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #2a2a2a;
            color: #f0f0f0;
        }

        input[readonly],
        textarea[readonly] {
            background: #252525;
            color: #cfcfcf;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            padding: 10px 14px;
            margin-right: 8px;
            margin-top: 8px;
            border: 1px solid #555;
            border-radius: 8px;
            background: #333;
            color: #f5f5f5;
            cursor: pointer;
        }

        button:hover {
            background: #3f3f3f;
        }

        button:active {
            background: #4a4a4a;
        }

        #dropsContainer {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 12px;
            max-width: 900px;
        }

        .drop-row {
            padding: 14px;
            border: 1px solid #444;
            border-radius: 12px;
            background: #252525;
        }

        .drop-row p:first-child {
            margin-top: 0;
            font-weight: bold;
            color: #ffffff;
        }

        #output {
            max-width: 900px;
        }

        #output p {
            margin: 6px 0;
            padding: 8px 10px;
            background: #252525;
            border: 1px solid #3c3c3c;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Node JSON Generator</h1>

    <p>Name</p>
    <input id="nameInput" type="text">

    <p>ID (auto from name)</p>
    <input id="idInput" type="text" readonly>

    <p>Description</p>
    <input id="descInput" type="text">

    <p>Image</p>
    <input id="imgInput" type="text" readonly>

    <p>Notes</p>
    <input id="notesInput" type="text">

    <p>Category</p>
    <select id="categoryInput">
        <option value="Ore">Ore</option>
        <option value="Trees">Trees</option>
        <option value="Plants">Plants</option>
    </select>

    <p>Subcategory</p>
    <select id="subcategoryInput">
        <option value="determinSubCategory">determinSubCategory</option>
        <option value="Food">Food</option>
        <option value="NotFood">NotFood</option>
    </select>

    <p>Tool</p>
    <select id="toolInput">
        <option value="pick">pick</option>
        <option value="axe">axe</option>
        <option value="sword">sword</option>
        <option value="hand">hand</option>
    </select>

    <p>Health</p>
    <input id="healthInput" type="number" value="-1">

    <p>XP</p>
    <input id="xpInput" type="number" value="-1">

    <p>Rarity</p>
    <select id="rarityInput">
        <option value="Common">Common</option>
        <option value="Rare">Rare</option>
        <option value="Extremely Rare">Extremely Rare</option>
    </select>

    <h2>Drops</h2>
    <div id="dropsContainer"></div>
    <button id="addDropButton" type="button">Add Drop</button>

    <br><br>
    <button id="generateButton">Generate JSON</button>
    <button id="clearButton">Clear</button>
    <button id="copyButton">Copy text</button>

    <h2>Output</h2>
    <textarea id="output" rows="30" readonly></textarea>

    <script>
        const nameInput = document.getElementById("nameInput");

        const idInput = document.getElementById("idInput");
        const descInput = document.getElementById("descInput");
        const imgInput = document.getElementById("imgInput");
        const notesInput = document.getElementById("notesInput");
        const categoryInput = document.getElementById("categoryInput");
        const subcategoryInput = document.getElementById("subcategoryInput");
        const toolInput = document.getElementById("toolInput");
        const healthInput = document.getElementById("healthInput");
        const xpInput = document.getElementById("xpInput");
        const rarityInput = document.getElementById("rarityInput");
        const dropsContainer = document.getElementById("dropsContainer");
        const addDropButton = document.getElementById("addDropButton");
        const generateButton = document.getElementById("generateButton");
        const clearButton = document.getElementById("clearButton");
        const output = document.getElementById("output");
        const copyButton = document.getElementById("copyButton");

        const DEFAULT_DROP_1_ID = '$id';
        const DEFAULT_DROP_2_ID = '$sd';

        function makeIdFromName(name) {
            return name
                .trim()
                .toLowerCase()
                .replace(/['"]/g, "")
                .replace(/[^a-z0-9]+/g, "_")
                .replace(/^_+|_+$/g, "");
        }

        function updateAutoFields() {
            const id = makeIdFromName(nameInput.value);
            idInput.value = id;
            imgInput.value = id ? `${id}.jpg` : "";
        }

        function createDropRow(dropNumber) {
            const wrapper = document.createElement("div");
            wrapper.className = "drop-row";
            wrapper.dataset.dropNumber = String(dropNumber);

            const title = document.createElement("p");
            title.textContent = `Drop ${dropNumber}`;
            wrapper.appendChild(title);

            const idLabel = document.createElement("p");
            idLabel.textContent = "Item ID";
            wrapper.appendChild(idLabel);

            const idInput = document.createElement("input");
            idInput.type = "text";
            idInput.className = "drop-id-input";

            idInput.addEventListener("keydown", (event) => {
                if (event.key !== "Enter") {
                    return;
                }
                if (event.key == "Enter" && event.shiftKey){
                    copy();
                    return;
                }

                event.preventDefault();

                const allRows = Array.from(dropsContainer.querySelectorAll(".drop-row"));
                const currentIndex = allRows.indexOf(wrapper);
                const nextRow = allRows[currentIndex + 1];

                if (nextRow) {
                    nextRow.querySelector(".drop-id-input").focus();
                    nextRow.querySelector(".drop-id-input").select();
                    return;
                }

                addDrop("", "#?");

                const newRows = dropsContainer.querySelectorAll(".drop-row");
                const newLastRow = newRows[newRows.length - 1];
                const newIdInput = newLastRow.querySelector(".drop-id-input");

                newIdInput.focus();
                newIdInput.select();
            });

            wrapper.appendChild(idInput);

            const amountLabel = document.createElement("p");
            amountLabel.textContent = "Amount";
            wrapper.appendChild(amountLabel);

            const amountInput = document.createElement("input");
            amountInput.type = "text";
            amountInput.value = "#?";
            amountInput.className = "drop-amount-input";
            wrapper.appendChild(amountInput);

            const removeButton = document.createElement("button");
            removeButton.type = "button";
            removeButton.textContent = "Remove Drop";
            removeButton.addEventListener("click", () => {
                wrapper.remove();
                renumberDrops();
            });
            wrapper.appendChild(removeButton);

            return wrapper;
        }

        function renumberDrops() {
            const rows = dropsContainer.querySelectorAll(".drop-row");

            rows.forEach((row, index) => {
                const dropNumber = index + 1;
                row.dataset.dropNumber = String(dropNumber);
                const title = row.querySelector("p");
                title.textContent = `Drop ${dropNumber}`;
            });
        }

        function addDrop(defaultId = "", defaultAmount = "#?") {
            const dropNumber = dropsContainer.querySelectorAll(".drop-row").length + 1;
            const row = createDropRow(dropNumber);

            row.querySelector(".drop-id-input").value = defaultId;
            row.querySelector(".drop-amount-input").value = defaultAmount;

            dropsContainer.appendChild(row);
        }

        function getDropsObject() {
            const rows = dropsContainer.querySelectorAll(".drop-row");
            const drops = {};
            let realDropNumber = 1;

            rows.forEach((row) => {
                const rawDropId = row.querySelector(".drop-id-input").value;
                const dropId = cleanTypedId(rawDropId);
                const dropAmount = row.querySelector(".drop-amount-input").value.trim() || "#?";

                if (dropId === "") {
                    return;
                }

                const dropKey = `drop${realDropNumber}`;
                drops[dropKey] = {
                    id: dropId,
                    amount: dropAmount
                };
                realDropNumber++;
            });

            return drops;
        }

        function generateNodeObject() {
            const id = idInput.value.trim();

            return {
                id: id,
                name: nameInput.value.trim(),
                desc: descInput.value.trim(),
                img: id ? `${id}.jpg` : "",
                notes: notesInput.value.trim(),
                category: categoryInput.value,
                subcategory: subcategoryInput.value,
                health: Number(healthInput.value),
                tool: toolInput.value,
                drops: {
                    items: getDropsObject(),
                    xp: Number(xpInput.value)
                },
                rarity: rarityInput.value
            };
        }

        function cleanTypedId(value) {
            if (!value) return "";
            const id = idInput.value;
            return value
                .replaceAll('$id', `${id}`)
                .replaceAll('$ee', `elemental_essence_${id}`)
                .replaceAll('$sd', `${id}_seed`)
                .replaceAll('$fec', `fire_enchant_stone_`)
                .replaceAll('$iec', `ice_enchant_stone_`)
                .replaceAll('$lec', `lightning_enchant_stone_`)
                .replaceAll('$p', `pistil`)
                .replaceAll('$sm', `small_bee`)
                .trim()
                .toLowerCase()
                .replace(/^"+|"+$/g, "")
                .replace(/['"]/g, "")
                .replace(/[^a-z0-9]+/g, "_");
        }

        function clearEntryFields() {
            nameInput.value = "";
            descInput.value = "";
            notesInput.value = "";

            dropsContainer.innerHTML = "";
            addDrop(DEFAULT_DROP_1_ID, "#?");
            addDrop(DEFAULT_DROP_2_ID, "#?");

            updateAutoFields();
            nameInput.focus();
        }

        nameInput.addEventListener("input", updateAutoFields);

        nameInput.addEventListener("keydown", (event) => {
            if (event.key !== "Enter") {
                return;
            }

            event.preventDefault();

            let firstDropInput = dropsContainer.querySelector(".drop-row .drop-id-input");

            if (!firstDropInput) {
                addDrop("", "#?");
                firstDropInput = dropsContainer.querySelector(".drop-row .drop-id-input");
            }

            if (firstDropInput) {
                firstDropInput.focus();
                firstDropInput.select();
            }
        });

        addDropButton.addEventListener("click", () => {
            addDrop("", "#?");
        });

        generateButton.addEventListener("click", () => {
            gen();
        });

        clearButton.addEventListener("click", () => {
            clearEntryFields();
        });

        copyButton.addEventListener("click", () => {
            copy();
        });

        function gen(){
            const node = generateNodeObject();
            output.value = JSON.stringify(node, null, 4) + ',';
        }

        function copy(){
            gen();
            output.value = output.value.slice(0, -1);
            navigator.clipboard.writeText(output.value).then(() => {
                //nothing
            }).catch(err => {
                console.error('Could not copy text: ', err);
            });
            clearEntryFields();
        }

        addDrop("");
        updateAutoFields();
    </script>
</body>
</html>
