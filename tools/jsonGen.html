<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen-Station | Unified Generator v2</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
 	<script>eruda.init();</script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --border: #334155;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { box-sizing: border-box; transition: all 0.15s ease; font-family: 'Inter', system-ui, sans-serif; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 1100px; }

        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 20px; color: var(--accent); letter-spacing: -0.025em; }

        /* Mode Toggle */
        .mode-selector {
            display: inline-flex;
            background: var(--card-bg);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .mode-btn {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-weight: 600;
        }

        .mode-btn.active { background: var(--accent); color: var(--bg); }

        /* Layout */
        .grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 24px; }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .full-width { grid-column: 1 / -1; }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            margin-bottom: 16px;
        }

        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
        .readonly { background: #111827; color: var(--text-dim); cursor: not-allowed; }

        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn-primary { background: var(--accent); color: var(--bg); }
        .btn-secondary { background: var(--border); color: white; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        .dynamic-row {
            background: rgba(15, 23, 42, 0.5);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid var(--accent);
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        #output { font-family: 'Fira Code', monospace; background: #000; min-height: 300px; font-size: 0.85rem; margin-top: 10px; resize: vertical;}
        .hidden { display: none; }

        .action-bar {
            position: sticky;
            bottom: 20px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(12px);
            padding: 16px 32px;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 40px;
            z-index: 100;
        }

        .row-group { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>JSON Generator</h1>
            <div class="mode-selector">
                <button class="mode-btn active" id="btn-node" onclick="switchMode('node')">Node Def</button>
                <button class="mode-btn" id="btn-item" onclick="switchMode('item')">Item Def</button>
            </div>
        </header>

        <div class="grid">
            <div class="card full-width">
                <div class="row-group">
                    <div>
                        <label>Name</label>
                        <input type="text" id="nameInput" placeholder="e.g. Damascus Steel Ore">
                    </div>
                    <div>
                        <label>Generated ID</label>
                        <input type="text" id="idInput" class="readonly" readonly>
                    </div>
                </div>
                <label>Description</label>
                <input type="text" id="descInput" placeholder="Item/Node flavor text...">
                
                <div class="row-group">
                    <div>
                        <label>Image</label>
                        <input type="text" id="imgInput" class="readonly" readonly>
                    </div>
                    <div>
                        <label>Notes</label>
                        <input type="text" id="notesInput" placeholder="Usage details... or fun trivia">
                    </div>
                    <div>
                        <label>Tags (Comma separated)</label>
                        <input type="text" id="tagsInput" placeholder="e.g. craftable, rare_spawn">
                    </div>
                </div>
            </div>

            <div class="card">
                <div id="nodeMeta">
                    <label>Node Category</label>
                    <select id="nodeCategory">
                        <option value="Ore">Ore</option>
                        <option value="Trees">Trees</option>
                        <option value="Plants">Plants</option>
                        <option value="Other">Other</option>
                    </select>
                    <label>Subcategory</label>
                    <select id="nodeSubcategory">
                        <option value="determinSubCategory">determinSubCategory</option>
                        <option value="Food">Food</option>
                        <option value="NotFood">NotFood</option>
                    </select>
                    <label>Rarity</label>
                    <select id="nodeRarity">
                        <option value="Common">Common</option>
                        <option value="Rare">Rare</option>
                        <option value="Extremely Rare">Extremely Rare</option>
                    </select>
                </div>

                <div id="itemMeta" class="hidden">
                    <label>Item Category</label>
                    <select id="itemCategory" onchange="toggleItemConditionals()">
                        <option value="Material">Material</option>
                        <option value="Food">Food</option>
                        <option value="Equippable">Equippable</option>
                        <option value="Useable">Useable</option>
                        <option value="Bulding">Bulding</option>
                    </select>
                    <label>Subcategory</label>
                    <select id="itemSubcategory">
                        <option value="Ore">Ore</option>
                        <option value="Bar">Bar</option>
                        <option value="Drop">Drop</option>
                        <option value="Wood">Wood</option>
                        <option value="BBQ">BBQ</option>
                        <option value="DetermineSubcategory">DetermineSubcategory</option>
                        <option value="Additives">Additives</option>
                        <option value="EnchantStone">EnchantStone</option>
                        <option value="Plant">Plant</option>
                    </select>
                    <label>Rarity</label>
                    <select id="itemRarity">
                        <option value="common">common</option>
                        <option value="uncommon">uncommon</option>
                        <option value="rare">rare</option>
                        <option value="epic">epic</option>
                        <option value="legendary">legendary</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <div id="nodeStats">
                    <label>Tool Requirement</label>
                    <select id="nodeTool">
                        <option value="pick">Pickaxe</option>
                        <option value="axe">Axe</option>
                        <option value="sword">Sword</option>
                        <option value="hand">Hand</option>
                    </select>
                    <div class="row-group">
                        <div>
                            <label>Health</label>
                            <input type="text" id="nodeHealth" value="#?">
                        </div>
                        <div>
                            <label>XP Yield</label>
                            <input type="text" id="nodeXP" value="#?">
                        </div>
                    </div>
                </div>

                <div id="itemStats" class="hidden">
                    <div class="row-group">
                        <div>
                            <label>Weight</label>
                            <input type="number" id="itemWeight" step="0.01" value="0.01">
                        </div>
                        <div>
                            <label>Bound</label>
                            <select id="itemBound">
                                <option value="false">False</option>
                                <option value="true">True</option>
                            </select>
                        </div>
                    </div>
                    
                    <div id="foodFields" class="hidden">
                        <div class="row-group">
                            <div><label>Food</label><input type="number" id="foodVal" value="0"></div>
                            <div><label>Water</label><input type="number" id="waterVal" value="0"></div>
                        </div>
                    </div>

                    <div id="equipFields" class="hidden">
                        <div class="row-group">
                            <div><label>Durability</label><input type="number" id="durability" value="0"></div>
                            <div><label>Level Limit</label><input type="number" id="levelLimit" value="0"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card full-width">
                <div id="nodeDrops">
                    <label>Loot Drops (items array)</label>
                    <div id="dropsContainer"></div>
                    <button class="btn btn-secondary" onclick="addDropRow()">+ Add Drop</button>
                </div>

                <div id="itemSources" class="hidden">
                    <div class="row-group">
                        <div>
                            <label>Node Sources (ID array)</label>
                            <div id="nodeSrcContainer"></div>
                            <button class="btn btn-secondary" onclick="addSourceRow('node')">+ Add Node</button>
                        </div>
                        <div>
                            <label>Uses (String array)</label>
                            <div id="usesContainer"></div>
                            <button class="btn btn-secondary" onclick="addSourceRow('use')">+ Add Use</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card full-width">
                <label>Output Preview</label>
                <textarea id="output" readonly placeholder="JSON will appear here..."></textarea>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn btn-danger" onclick="clearAll()">Clear</button>
            <button class="btn btn-secondary" onclick="previewJSON()">Preview</button>
            <button class="btn btn-secondary" onclick="copyToClipboard()">Copy & Reset</button>
            <button class="btn btn-primary" onclick="copyButNoReset()">Copy</button>
        </div>
    </div>
    <script>
        // --- Replace the existing <script> section in jsonGen.html with this updated logic ---

        let currentMode = 'node';

        const macros = {
            '$ee': 'elemental_essence_',
            '$sd': '_seed',
            '$fec': 'fire_enchant_stone_',
            '$iec': 'ice_enchant_stone_',
            '$p': 'pistil'
        };

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
            ['nodeMeta', 'nodeStats', 'nodeDrops'].forEach(id => document.getElementById(id).classList.toggle('hidden', mode !== 'node'));
            ['itemMeta', 'itemStats', 'itemSources'].forEach(id => document.getElementById(id).classList.toggle('hidden', mode !== 'item'));
            clearAll();
        }

        // Auto-ID & Navigation Logic
        document.getElementById('nameInput').addEventListener('input', (e) => {
            const id = e.target.value.trim().toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "");
            document.getElementById('idInput').value = id;
            document.getElementById('imgInput').value = id ? `${id}.jpg` : "null";
        });

        // Global Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            // Shift + Enter: Preview and jump to top
            if (e.key === 'Enter' && e.shiftKey) {
                e.preventDefault();
                previewJSON();
                document.getElementById('nameInput').focus();
                window.scrollTo(0, 0);
                return;
            }

            // Enter Navigation
            if (e.key === 'Enter') {
                const active = document.activeElement;

                // From Name Input
                if (active.id === 'nameInput') {
                    e.preventDefault();
                    if (currentMode === 'node') {
                        // Nodes: Name -> Drops (Skip desc)
                        focusOrCreateDrop(0);
                    } else {
                        // Items: Name -> Desc
                        document.getElementById('descInput').focus();
                    }
                } 
                // From Description (Only relevant for Items in this flow)
                else if (active.id === 'descInput' && currentMode === 'item') {
                    e.preventDefault();
                    document.getElementById('itemWeight').focus();
                }
                // Inside Drops
                else if (active.classList.contains('d-id') || active.classList.contains('d-amt')) {
                    e.preventDefault();
                    const rows = Array.from(document.querySelectorAll('#dropsContainer .dynamic-row'));
                    const currentRow = active.closest('.dynamic-row');
                    const index = rows.indexOf(currentRow);
                    
                    // If in ID field, jump to Amt. If in Amt field, jump to next row ID.
                    if (active.classList.contains('d-id')) {
                        currentRow.querySelector('.d-amt').focus();
                    } else {
                        focusOrCreateDrop(index + 1);
                    }
                }
            }
        });

        // Helper to handle drop focus/creation
        function focusOrCreateDrop(index) {
            let rows = document.querySelectorAll('#dropsContainer .dynamic-row');
            if (index >= rows.length) {
                addDropRow(); // Uses your existing addDropRow function
                rows = document.querySelectorAll('#dropsContainer .dynamic-row');
            }
            const targetInput = rows[index].querySelector('.d-id');
            targetInput.focus();
            targetInput.select();
        }

        function addDropRow(valId = "", valAmt = "#?") {
            const container = document.getElementById('dropsContainer');
            const div = document.createElement('div');
            div.className = 'dynamic-row';
            div.innerHTML = `
                <input type="text" placeholder="Drop ID ($id, $sd...)" class="d-id" value="${valId}" onchange="this.value = applyMacros(this.value)" style="margin-bottom:0; flex:2">
                <input type="text" placeholder="Amt" class="d-amt" value="${valAmt}" style="margin-bottom:0; flex:1">
                <button class="btn btn-danger" onclick="this.parentElement.remove()" style="padding: 12px">×</button>
            `;
            container.appendChild(div);
        }

        function addSourceRow(type, val = "") {
            const container = document.getElementById(type === 'node' ? 'nodeSrcContainer' : 'usesContainer');
            const div = document.createElement('div');
            div.className = 'dynamic-row';
            div.innerHTML = `
                <input type="text" class="${type}-val" value="${val}" style="margin-bottom:0; flex:1">
                <button class="btn btn-danger" onclick="this.parentElement.remove()" style="padding: 12px">×</button>
            `;
            container.appendChild(div);
        }

        function toggleItemConditionals() {
            const cat = document.getElementById('itemCategory').value;
            document.getElementById('foodFields').classList.toggle('hidden', cat !== 'Food');
            document.getElementById('equipFields').classList.toggle('hidden', cat !== 'Equippable');
        }

        function buildJSON() {
            const tagsRaw = document.getElementById('tagsInput').value;
            const tagsArray = tagsRaw.split(',').map(t => t.trim().toLowerCase()).filter(t => t !== "");

            const base = {
                id: document.getElementById('idInput').value,
                name: document.getElementById('nameInput').value,
                desc: document.getElementById('descInput').value,
                img: document.getElementById('imgInput').value === "null" ? null : document.getElementById('imgInput').value,
                tags: tagsArray,
                notes: document.getElementById('notesInput').value
            };

            if (currentMode === 'node') {
                const dropsArray = [];
                document.querySelectorAll('#dropsContainer .dynamic-row').forEach((row) => {
                    const id = row.querySelector('.d-id').value;
                    if (id) {
                        dropsArray.push({ id: id, amount: row.querySelector('.d-amt').value });
                    }
                });

                return {
                    ...base,
                    category: document.getElementById('nodeCategory').value,
                    subcategory: document.getElementById('nodeSubcategory').value,
                    health: document.getElementById('nodeHealth').value,
                    tool: document.getElementById('nodeTool').value,
                    drops: { items: dropsArray, xp: document.getElementById('nodeXP').value },
                    rarity: document.getElementById('nodeRarity').value
                };
            } else {
                const item = {
                    ...base,
                    weight: Number(document.getElementById('itemWeight').value),
                    sources: { 
                        node: Array.from(document.querySelectorAll('.node-val')).map(i => i.value).filter(v => v),
                        enemy: [] 
                    },
                    uses: Array.from(document.querySelectorAll('.use-val')).map(i => i.value).filter(v => v),
                    category: document.getElementById('itemCategory').value,
                    subcategory: document.getElementById('itemSubcategory').value,
                    rarity: document.getElementById('itemRarity').value,
                    bound: document.getElementById('itemBound').value === 'true'
                };

                if (item.category === 'Food') {
                    item.foodStats = { food: parseInt(document.getElementById('foodVal').value), water: parseInt(document.getElementById('waterVal').value) };
                }
                if (item.category === 'Equippable') {
                    item.durability = parseInt(document.getElementById('durability').value);
                    item.levelLimit = parseInt(document.getElementById('levelLimit').value);
                }
                return item;
            }
        }

        function previewJSON() {
            const obj = buildJSON();
            const out = document.getElementById('output');
            out.value += (out.value ? "\n" : "") + JSON.stringify(obj, null, 4) + ",";
            out.scrollTop = out.scrollHeight;
        }

        async function copyToClipboard() {
            previewJSON();
            const text = document.getElementById('output').value.replace(/,$/, "");
            await navigator.clipboard.writeText(text);
            clearAll();
            document.getElementById('nameInput').focus();
        }

        async function copyButNoReset() {
            const text = document.getElementById('output').value.replace(/,$/, "");
            await navigator.clipboard.writeText(text);
        }

        function clearAll() {
            document.querySelectorAll('input:not(.readonly)').forEach(i => {
                if(i.id === 'nodeHealth' || i.id === 'nodeXP') i.value = "#?";
                else if(i.type === 'number') i.value = i.defaultValue || "0";
                else i.value = "";
            });
            document.querySelectorAll('.dynamic-row').forEach(r => r.remove());
            document.getElementById('output').value = "";
            document.getElementById('tagsInput').value = "";
            if (currentMode === 'item') toggleItemConditionals();
        }

        switchMode('node');
    </script>
</body>
</html>
