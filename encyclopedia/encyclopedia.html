<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Utopia: Origin Notes - Encyclopedia</title>
  <link rel="stylesheet" href="../map/map.css" />
  <link rel="stylesheet" href="encyclopedia.css" />
</head>
<body>
  <script src="log.js"></script> 
  <header class="site-header">
    <div class="header-row">
      <div>
        <h1>Utopia: Origin Notes</h1>
        <p class="subtitle">Encyclopedia</p>
      </div>

      <nav class="top-nav">
        <a href="../" class="nav-link">Home</a>
        <a href="../map/" class="nav-link">Map</a>
        <a href="./" class="nav-link current">Encyclopedia</a>
      </nav>
    </div>
  </header>

  <div class="encyclopedia-tabs" role="tablist" aria-label="Encyclopedia sections">
    <button
      type="button"
      class="encyclopedia-tab active"
      data-tab="items"
      role="tab"
      aria-selected="true"
    >
      Items
    </button>

    <button
      type="button"
      class="encyclopedia-tab"
      data-tab="nodes"
      role="tab"
      aria-selected="false"
    >
      Nodes
    </button>

    <button
      type="button"
      class="encyclopedia-tab"
      data-tab="enemies"
      role="tab"
      aria-selected="false"
    >
      Enemies
    </button>
  </div>

  <main class="encyclopedia-layout">
    <!-- Left: shared controls + tab-specific controls -->
    <aside class="encyclopedia-sidebar">
      <div class="panel-section">
        <h3>Search</h3>
        <input
          id="entry-search"
          class="search-input"
          type="text"
          placeholder="Search current tab..."
          autocomplete="off"
        />
        <div class="result-count" id="entry-result-count">0 results</div>
      </div>

      <div class="panel-section">
        <h3>Sort</h3>
        <select id="sort-filter" class="island-select">
          <option value="name-asc">Name (A-Z)</option>
          <option value="name-desc">Name (Z-A)</option>
        </select>
      </div>

      <!-- JS swaps content here depending on active tab -->
      <div id="tab-extra-filters"></div>
    </aside>

    <!-- Center: shared detail panel -->
    <section class="encyclopedia-details">
      <div class="details-card" id="entry-details">
        <div class="details-empty">
          <div class="details-empty-icon">📘</div>
          <h2>Select an entry</h2>
          <p>Choose something from the current tab to view its info.</p>
        </div>
      </div>
    </section>

    <!-- Right: shared browse grid -->
    <aside class="encyclopedia-grid-panel">
      <div class="grid-panel-header">
        <h3 id="grid-title">Items</h3>
        <div class="page-indicator" id="page-indicator">Page 1 / 1</div>
      </div>

      <div class="item-grid" id="entry-grid"></div>

      <div class="pagination-bar">
        <button class="btn" id="prev-page-btn" type="button">Prev</button>
        <button class="btn" id="next-page-btn" type="button">Next</button>
      </div>
    </aside>
  </main>

  <script type="module" src="encyclopedia.js"></script>
</body>
</html>
